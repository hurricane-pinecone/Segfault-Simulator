<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="favicon.png" type="image/png" />
    <link rel="shortcut icon" href="favicon.png" />
    <title>Segfault Simulator</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: radial-gradient(circle at center, #111 0%, #000 100%);
        color: white;
        font-family: "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
      }

      #root {
        display: flex;
        flex-direction: column;
        height: 100%;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 20px;
        box-sizing: border-box;
      }

      #title {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 1px;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
      }

      #container {
        aspect-ratio: 4 / 3;
        width: min(70vw, 900px);
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        border-radius: 8px;
        overflow: hidden;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: black;
      }

      #panel {
        width: min(70vw, 900px);
        background: rgba(20, 20, 20, 0.75);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 14px 18px;
        text-align: center;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
      }

      #panel h2 {
        margin: 0 0 8px 0;
        font-size: 14px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #aaa;
      }

      #panel p {
        margin: 0;
        font-size: 14px;
        color: #ccc;
      }

      .controls {
        margin-top: 12px;
      }

      .touch-row {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 8px;
      }

      .touch-button {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        border: 1px solid #555;
        background: linear-gradient(180deg, #333, #181818);
        color: white;
        font-weight: bold;
        font-size: 20px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          0 4px 8px rgba(0, 0, 0, 0.6);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        user-select: none;
      }

      .touch-button.interactive {
        touch-action: none;
      }

      .touch-button.interactive:active,
      .touch-button.interactive.pressed {
        transform: translateY(2px);
        background: linear-gradient(180deg, #444, #222);
      }

      @media (pointer: coarse), (max-width: 700px) {
        #container,
        #panel {
          width: min(94vw, 900px);
        }

        #title {
          font-size: 22px;
        }

        .touch-button {
          width: 100px;
          height: 100px;
          font-size: 28px;
        }

        .touch-row {
          gap: 12px;
          margin-top: 12px;
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="title">Segfault Simulator</div>

      <div id="container">
        <canvas
          id="canvas"
          oncontextmenu="event.preventDefault()"
          tabindex="-1"
        ></canvas>
      </div>

    <div id="panel">
      <h2>Controls</h2>
      <p>Use WASD to move</p>
      <p>Move the mouse to control the sun</p>
      <p>Left/right changes sun direction; up/down changes sun height</p>
      <p>Top of screen = midday, bottom of screen = night</p>
      <p>Press the buttons below on mobile</p>

      <div class="controls">
        <div>
          <div class="touch-button interactive" data-key="w">W</div>
        </div>

        <div class="touch-row">
          <div class="touch-button interactive" data-key="a">A</div>
          <div class="touch-button interactive" data-key="s">S</div>
          <div class="touch-button interactive" data-key="d">D</div>
        </div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("canvas");

      var Module = {
        canvas,
      };

      function emitKey(type, key) {
        window.dispatchEvent(
          new KeyboardEvent(type, {
            key,
            code: "Key" + key.toUpperCase(),
            bubbles: true,
          }),
        );
      }

      // Enable touch + mouse interaction (mobile + desktop)
      document
        .querySelectorAll(".touch-button.interactive")
        .forEach((button) => {
          const key = button.dataset.key;

          const press = (event) => {
            event.preventDefault();
            button.classList.add("pressed");
            canvas.focus();
            emitKey("keydown", key);
          };

          const release = (event) => {
            event.preventDefault();
            button.classList.remove("pressed");
            emitKey("keyup", key);
          };

          // touch
          button.addEventListener("touchstart", press, { passive: false });
          button.addEventListener("touchend", release, { passive: false });
          button.addEventListener("touchcancel", release, { passive: false });

          // mouse (so it works on desktop too)
          button.addEventListener("mousedown", press);
          button.addEventListener("mouseup", release);
          button.addEventListener("mouseleave", release);
        });
    </script>

    {{{ SCRIPT }}}
  </body>
</html>
