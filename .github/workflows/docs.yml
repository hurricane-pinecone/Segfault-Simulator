name: Docs

# Two flows in one workflow so they share a single Actions entry:
#  - sync:    a master push (or manual run) that touches source drafts doc
#             updates with Claude Code and opens a PR (the review gate -- nothing
#             lands on master unreviewed). Docs-only pushes don't match the source
#             paths below, so there is no loop.
#  - iterate: a "@claude ..." comment on a docs PR has Claude apply the request
#             and push it back, so the PR updates in place.
# Each job is gated by event type, so a push runs only `sync` and a comment runs
# only `iterate`.
on:
  push:
    branches: [master]
    paths:
      - engine/**
      - sampleGame/**
      - samplePlatformer/**
  workflow_dispatch:
    inputs:
      base:
        description: >-
          Git ref to diff from (e.g. a commit SHA). Manual runs default to the
          previous commit, which is the workflow-YAML commit itself after you
          push a workflow change -- set this to the commit BEFORE the source
          changes you want documented (e.g. 90dc33d to cover 1ecf031), or to an
          older ref to backfill docs for already-merged work.
        required: false
        default: ""
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  statuses: write # the sync job self-reports the required checks on docs PRs

jobs:
  # On a master push that touches source, draft documentation updates with Claude
  # Code and open a PR with them.
  sync:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: docs-sync
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Collect changed source files
        id: changed
        run: |
          # A manual run's explicit base wins; otherwise use the push's
          # before-sha. Either is validated below and falls back to HEAD~1.
          base='${{ github.event.inputs.base }}'
          if [ -z "$base" ]; then
            base='${{ github.event.before }}'
          fi
          if [ -z "$base" ] \
             || [ "$base" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          files="$(git diff --name-only "$base" HEAD -- engine sampleGame samplePlatformer | grep -vE '\.md$' || true)"
          if [ -z "$files" ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
            { echo "files<<EOF"; echo "$files"; echo "EOF"; } >> "$GITHUB_OUTPUT"
            # The actual before->after diff Claude reviews (kept out of the PR by
            # the add-paths allowlist; lives at the repo root so Claude can Read it).
            git diff "$base" HEAD -- engine sampleGame samplePlatformer > source.diff
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.changed.outputs.empty == 'false'
        with:
          node-version: "20"

      - name: Install Claude Code
        if: steps.changed.outputs.empty == 'false'
        run: npm install -g @anthropic-ai/claude-code

      - name: Create or update docs for the changed source
        if: steps.changed.outputs.empty == 'false'
        env:
          # Long-lived subscription token from `claude setup-token`
          # (use ANTHROPIC_API_KEY instead if you switch to Console API billing).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CHANGED: ${{ steps.changed.outputs.files }}
        run: |
          # The CLI sends the token as an HTTP auth header; a stray newline or space
          # in the secret makes that header invalid ("Header has invalid value").
          # Strip whitespace defensively so it doesn't matter how the secret was pasted.
          export CLAUDE_CODE_OAUTH_TOKEN="$(printf '%s' "$CLAUDE_CODE_OAUTH_TOKEN" | tr -d '[:space:]')"
          PROMPT="The following source files changed (diff against the base ref):
          $CHANGED

          The exact before->after changes are in source.diff at the repo root -- READ IT FIRST to see what actually changed. The whole repository is checked out, so Read/Grep/Glob any source or doc file you need to judge the impact.

          Then bring the Markdown documentation under docs/ in line with these changes wherever they alter what a game developer relies on (public API, behaviour, structure, or example snippets). There are two cases, and you should do BOTH as needed:
          - UPDATE an existing page when a change alters a feature that docs/ already covers.
          - CREATE a new page when a change introduces a public feature or subsystem a game developer relies on and NO page documents it yet (this is expected for new architecture -- do not skip it just because nothing exists to edit). Place it and register it in the mkdocs.yml nav per .github/docs-structure.md so it appears on the site.
          If the change is internal-only (a refactor, a comment, a private detail) and the docs still read correctly, make NO edits. Document the public surface, not every changed file.

          Read .github/docs-style.md (prose and voice) and .github/docs-structure.md (page layout, navigation, and what you may edit) before editing, and follow both. Match the voice and structure of the existing docs.

          Finally, if (and only if) you edited any docs, write a single-line pull request title to the file docs-pr-title.txt at the repository root. Start it with 'docs: ' and concisely name what you actually changed -- the page(s) or feature(s) touched, not 'recent source changes' (e.g. 'docs: document the block geometry system' or 'docs: update the particle API reference and add a decals page'). Keep it under ~70 characters and write nothing else to that file. If you made no doc edits, do not create the file."
          printf '%s' "$PROMPT" | claude -p \
            --permission-mode acceptEdits --max-turns 30 \
            --allowedTools "Read,Edit,Write,Grep,Glob"

      - name: Did Claude change any docs?
        id: edited
        if: steps.changed.outputs.empty == 'false'
        run: |
          # Only the docs/ tree and mkdocs.yml count (source.diff sits at the repo
          # root and is ignored). If Claude made no edits, the PR step is skipped
          # so a no-op run leaves any open docs PR untouched instead of letting
          # create-pull-request close it for having no diff.
          if [ -n "$(git status --porcelain -- docs mkdocs.yml)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve the PR title
        id: title
        if: steps.edited.outputs.changed == 'true'
        run: |
          # Claude writes a title describing the actual doc changes to
          # docs-pr-title.txt (repo root, kept out of the PR by add-paths). Take
          # its first non-empty line; fall back to the generic title if the file
          # is missing or empty so the PR always has a sensible name.
          default="docs: sync with recent source changes"
          title="$(grep -m1 . docs-pr-title.txt 2>/dev/null | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          if [ -z "$title" ]; then
            title="$default"
          fi
          echo "title=$title" >> "$GITHUB_OUTPUT"

      - name: Open a PR if docs changed
        id: cpr
        if: steps.edited.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # docs/ plus mkdocs.yml (repo root) so a newly added page ships with
          # its nav entry; source.diff and other root files stay out of the PR.
          add-paths: |
            docs
            mkdocs.yml
          # A fresh branch per triggering commit (docs/auto-sync-<short-sha>) so a
          # new source change opens its OWN PR instead of force-updating the
          # branch of an earlier, still-open docs PR. delete-branch cleans each up
          # when its PR merges or closes.
          branch: docs/auto-sync
          branch-suffix: short-commit-hash
          base: master
          delete-branch: true
          title: ${{ steps.title.outputs.title }}
          commit-message: ${{ steps.title.outputs.title }}
          labels: documentation
          body: |
            Automated documentation update for source changes on `master`, drafted by
            Claude Code from the files changed in the triggering push.

            **Review before merging.** If the docs didn't actually need changing, just
            close this PR — no harm done.

      # A docs-only PR can't break the code, and a bot-token PR never triggers
      # the `pull_request` workflows anyway, so the master ruleset's required
      # checks would otherwise sit forever "waiting for status to be reported".
      # Report them as passing on this PR's head commit so it's mergeable. Safe:
      # create-pull-request restricts this PR to docs/ + mkdocs.yml (add-paths).
      # KEEP THIS LIST IN SYNC with the ruleset's required status checks.
      - name: Mark required checks satisfied (docs-only PR)
        if: steps.edited.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ steps.cpr.outputs.pull-request-head-sha }}
        run: |
          for ctx in test-core sanitize-core test-runtime sanitize-runtime format build build-windows; do
            gh api "repos/${{ github.repository }}/statuses/$SHA" \
              -f state=success \
              -f context="$ctx" \
              -f description="Skipped for docs-only PR" >/dev/null
          done

  # Reply to a "@claude ..." comment on a docs PR: Claude reads the request, edits
  # the PR branch, and pushes the changes back so the PR updates in place.
  iterate:
    # Only act on a PR comment that mentions @claude, from someone with write
    # access (this runs with repo secrets, so never an arbitrary commenter), and
    # never on our own bot comments (which would loop).
    if: >-
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment')
      && github.event.comment.user.type != 'Bot'
      && contains(github.event.comment.body, '@claude')
      && (github.event.issue.pull_request || github.event.pull_request)
      && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      # One run per PR, queued (not cancelled) so two comments can't push over
      # each other mid-commit.
      group: docs-iterate-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    env:
      PR: ${{ github.event.issue.number || github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Check out the PR branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr checkout "$PR"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Apply the requested change
        env:
          # Same subscription token the sync job uses.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          COMMENT: ${{ github.event.comment.body }}
        run: |
          # Strip whitespace so a stray newline in the secret can't make the auth
          # header invalid (see the sync job for the full note).
          export CLAUDE_CODE_OAUTH_TOKEN="$(printf '%s' "$CLAUDE_CODE_OAUTH_TOKEN" | tr -d '[:space:]')"
          PROMPT="A reviewer left this comment on a documentation pull request:

          $COMMENT

          Do what it asks. The whole repository is checked out on the PR branch, so Read/Grep/Glob any source or doc file you need. Read .github/docs-style.md (prose and voice) and .github/docs-structure.md (page layout, navigation, and what you may edit) first, and follow both.

          Make the smallest change that satisfies the request and do not touch anything it didn't ask about. If the request is unclear, or is not a documentation change you should make here, make no edits."
          printf '%s' "$PROMPT" | claude -p \
            --permission-mode acceptEdits --max-turns 30 \
            --allowedTools "Read,Edit,Write,Grep,Glob"

      - name: Push the changes back to the PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet && git diff --cached --quiet; then
            gh pr comment "$PR" --body "I didn't change anything. The request looked already satisfied, or it was outside the docs I should edit here."
            exit 0
          fi
          git add -A
          git commit -m "docs: address review comment"
          git push
          # The push creates a new head commit with no statuses, so re-report the
          # required checks on it (same as the sync job). Keep this list in sync
          # with the master ruleset's required status checks.
          sha="$(git rev-parse HEAD)"
          for ctx in test-core sanitize-core test-runtime sanitize-runtime format build build-windows; do
            gh api "repos/${{ github.repository }}/statuses/$sha" \
              -f state=success \
              -f context="$ctx" \
              -f description="Skipped for docs-only PR" >/dev/null
          done
          gh pr comment "$PR" --body "Pushed an update addressing your comment."
