name: Sync docs

# On a master push that touches source, draft documentation updates with Claude
# Code and open a PR with them. The PR is the review gate -- nothing lands on
# master unreviewed. Docs-only pushes (e.g. merging this PR) don't match the
# source paths below, so there is no loop.
on:
  push:
    branches: [master]
    paths:
      - engine/**
      - sampleGame/**
      - samplePlatformer/**
  workflow_dispatch:
    inputs:
      base:
        description: >-
          Git ref to diff from (e.g. a commit SHA). Manual runs default to the
          previous commit, which is the workflow-YAML commit itself after you
          push a workflow change -- set this to the commit BEFORE the source
          changes you want documented (e.g. 90dc33d to cover 1ecf031), or to an
          older ref to backfill docs for already-merged work.
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed source files
        id: changed
        run: |
          # A manual run's explicit base wins; otherwise use the push's
          # before-sha. Either is validated below and falls back to HEAD~1.
          base='${{ github.event.inputs.base }}'
          if [ -z "$base" ]; then
            base='${{ github.event.before }}'
          fi
          if [ -z "$base" ] \
             || [ "$base" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          files="$(git diff --name-only "$base" HEAD -- engine sampleGame samplePlatformer | grep -vE '\.md$' || true)"
          if [ -z "$files" ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
            { echo "files<<EOF"; echo "$files"; echo "EOF"; } >> "$GITHUB_OUTPUT"
            # The actual before->after diff Claude reviews (kept out of the PR by
            # the add-paths allowlist; lives at the repo root so Claude can Read it).
            git diff "$base" HEAD -- engine sampleGame samplePlatformer > source.diff
          fi

      - uses: actions/setup-node@v4
        if: steps.changed.outputs.empty == 'false'
        with:
          node-version: "20"

      - name: Install Claude Code
        if: steps.changed.outputs.empty == 'false'
        run: npm install -g @anthropic-ai/claude-code

      - name: Create or update docs for the changed source
        if: steps.changed.outputs.empty == 'false'
        env:
          # Long-lived subscription token from `claude setup-token`
          # (use ANTHROPIC_API_KEY instead if you switch to Console API billing).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CHANGED: ${{ steps.changed.outputs.files }}
        run: |
          # The CLI sends the token as an HTTP auth header; a stray newline or space
          # in the secret makes that header invalid ("Header has invalid value").
          # Strip whitespace defensively so it doesn't matter how the secret was pasted.
          export CLAUDE_CODE_OAUTH_TOKEN="$(printf '%s' "$CLAUDE_CODE_OAUTH_TOKEN" | tr -d '[:space:]')"
          PROMPT="The following source files changed (diff against the base ref):
          $CHANGED

          The exact before->after changes are in source.diff at the repo root -- READ IT FIRST to see what actually changed. The whole repository is checked out, so Read/Grep/Glob any source or doc file you need to judge the impact.

          Then bring the Markdown documentation under docs/ in line with these changes wherever they alter what a game developer relies on (public API, behaviour, structure, or example snippets). There are two cases, and you should do BOTH as needed:
          - UPDATE an existing page when a change alters a feature that docs/ already covers.
          - CREATE a new page when a change introduces a public feature or subsystem a game developer relies on and NO page documents it yet (this is expected for new architecture -- do not skip it just because nothing exists to edit). Place it and register it in the mkdocs.yml nav per .github/docs-structure.md so it appears on the site.
          If the change is internal-only (a refactor, a comment, a private detail) and the docs still read correctly, make NO edits. Document the public surface, not every changed file.

          Read .github/docs-style.md (prose and voice) and .github/docs-structure.md (page layout, navigation, and what you may edit) before editing, and follow both. Match the voice and structure of the existing docs."
          printf '%s' "$PROMPT" | claude -p \
            --permission-mode acceptEdits --max-turns 30 \
            --allowedTools "Read,Edit,Write,Grep,Glob"

      - name: Did Claude change any docs?
        id: edited
        if: steps.changed.outputs.empty == 'false'
        run: |
          # Only the docs/ tree and mkdocs.yml count (source.diff sits at the repo
          # root and is ignored). If Claude made no edits, the PR step is skipped
          # so a no-op run leaves any open docs PR untouched instead of letting
          # create-pull-request close it for having no diff.
          if [ -n "$(git status --porcelain -- docs mkdocs.yml)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open a PR if docs changed
        if: steps.edited.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          # docs/ plus mkdocs.yml (repo root) so a newly added page ships with
          # its nav entry; source.diff and other root files stay out of the PR.
          add-paths: |
            docs
            mkdocs.yml
          branch: docs/auto-sync
          base: master
          delete-branch: true
          title: "docs: sync with recent source changes"
          commit-message: "docs: auto-sync with recent source changes"
          labels: documentation
          body: |
            Automated documentation update for source changes on `master`, drafted by
            Claude Code from the files changed in the triggering push.

            **Review before merging.** If the docs didn't actually need changing, just
            close this PR — no harm done.
