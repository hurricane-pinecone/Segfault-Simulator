name: Build and deploy web

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    # engine-core has no third-party dependencies (vendored Lua + glm), so the
    # tests build with just CMake + a compiler -- no Conan, SDL, or apt packages.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (engine-core only)
        run: cmake -S . -B build-core -DENGINE_CORE_ONLY=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build tests
        run: cmake --build build-core

      - name: Run tests
        run: ctest --test-dir build-core --output-on-failure

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure web build
        run: emcmake cmake -S . -B build-web -DCMAKE_BUILD_TYPE=Release

      - name: Build web
        run: cmake --build build-web --config Release

      # Docs share the game's single Pages site: the game at the root, the MkDocs
      # site under /docs. --strict fails the deploy on a broken link or nav entry.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build docs (into /docs)
        run: |
          pip install "mkdocs-material==9.*"
          mkdocs build --strict --site-dir build-web/bin/docs

      - name: Add nojekyll
        run: touch build-web/bin/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build-web/bin

  deploy:
    if: github.ref == 'refs/heads/master'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
