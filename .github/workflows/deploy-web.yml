name: Build, test, and deploy

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One run per branch or pull request: a new push supersedes an in-flight run of
# the same ref, but a master push never cancels a pull request's run (and vice
# versa). Pages-deploy serialization lives on the deploy job, not here.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-core:
    runs-on: ubuntu-latest

    # engine-core has no third-party dependencies (vendored Lua + glm), so the
    # tests build with just CMake + a compiler -- no Conan, SDL, or apt packages.
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Caches compiled object files (the vendored Lua sources and the engine's
      # own) across runs, keyed by preprocessed source + flags. Namespaced per
      # job so each compiler/flag set keeps its own store.
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2.20
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Configure (engine-core only)
        run: >
          cmake -S . -B build-core -DENGINE_CORE_ONLY=ON -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build tests
        run: cmake --build build-core -j "$(nproc)"

      - name: Run tests
        run: ctest --test-dir build-core --output-on-failure --parallel "$(nproc)"

  # The core-only build instrumented with ASan + UBSan. Pairs with test-core so a
  # standalone engine-core release gates on sanitized core tests too, without
  # pulling in the runtime stack (no Conan, SDL, or apt packages).
  sanitize-core:
    runs-on: ubuntu-latest

    env:
      ASAN_OPTIONS: halt_on_error=1:detect_leaks=1:abort_on_error=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2.20
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Configure (engine-core only, sanitized)
        run: >
          cmake -S . -B build-core -DENGINE_CORE_ONLY=ON -DENGINE_SANITIZE=ON -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build tests
        run: cmake --build build-core -j "$(nproc)"

      - name: Run tests under sanitizers
        run: ctest --test-dir build-core --output-on-failure --parallel "$(nproc)"

  # Runtime tests link the full engine (SDL/OpenGL), so this job restores the
  # Conan dependency closure and runs a native build. They drive systems and
  # render modules through mock seams (a fake IQuadRenderer, stub services), so
  # they run headless: no window, no GPU, no display. Split from the core test
  # job so a standalone engine-core release can gate on the core jobs alone; the
  # web deploy ships the runtime (both sample games), so it needs all of them.
  test-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Caches compiled object files (vendored Lua/imgui/tracy and the engine's
      # own) across runs. Separate from the Conan cache below, which holds the
      # third-party dependency binaries (SDL/imgui/glew).
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2.20
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.x"

      - name: Install Conan
        run: pip install "conan==2.*"

      - name: Detect Conan profile
        run: conan profile detect --force

      # Cache the built dependency closure so reruns skip recompiling SDL/imgui/
      # glew. The key hashes conanfile.py (where the deps are declared), so adding
      # or bumping a dep makes a new key. restore-keys then seeds the run from the
      # previous cache, and --build=missing compiles only the genuinely new
      # package -- Conan's store is keyed by package_id, so an unchanged dep is
      # reused and nothing stale is ever served.
      - name: Cache Conan packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      # Conan installs the deps' own system requirements (X11/GL dev packages the
      # SDL build needs) via apt, so the runner needs nothing pre-installed.
      - name: Install dependencies
        run: |
          conan install . --build=missing -s build_type=Debug \
            -c tools.build:jobs="$(nproc)" \
            -c tools.system.package_manager:mode=install \
            -c tools.system.package_manager:sudo=True

      - name: Configure (engine and tests)
        run: >
          cmake --preset debug -DENGINE_BUILD_SAMPLE=OFF
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build/Debug -j "$(nproc)"

      - name: Run runtime tests
        run: ctest --test-dir build/Debug -L runtime --output-on-failure --parallel "$(nproc)"

  # The runtime build instrumented with ASan + UBSan, running the runtime tests
  # under them so memory errors and UB the functional job passes over still fail
  # CI. Same headless seams as test-runtime; just instrumented. Core is sanitized
  # in sanitize-core, so this runs the runtime label only. ENGINE_SANITIZE applies
  # the flags to the engine libraries and tests only, so the prebuilt Conan
  # dependencies stay uninstrumented.
  sanitize-runtime:
    runs-on: ubuntu-latest

    env:
      # Abort on the first finding (UBSan otherwise logs and continues), and
      # print a stack so the failing line is in the CI log.
      ASAN_OPTIONS: halt_on_error=1:detect_leaks=1:abort_on_error=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2.20
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.x"

      - name: Install Conan
        run: pip install "conan==2.*"

      - name: Detect Conan profile
        run: conan profile detect --force

      # Shares the test-runtime Conan cache. The dependencies are built without
      # sanitizer flags (ENGINE_SANITIZE instruments only our targets), so these
      # are the same binaries that job uses.
      - name: Cache Conan packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Install dependencies
        run: |
          conan install . --build=missing -s build_type=Debug \
            -c tools.build:jobs="$(nproc)" \
            -c tools.system.package_manager:mode=install \
            -c tools.system.package_manager:sudo=True

      - name: Configure (engine and tests)
        run: >
          cmake --preset debug -DENGINE_BUILD_SAMPLE=OFF -DENGINE_SANITIZE=ON
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build/Debug -j "$(nproc)"

      - name: Run runtime tests under sanitizers
        run: ctest --test-dir build/Debug -L runtime --output-on-failure --parallel "$(nproc)"

  # Enforce .clang-format on the engine and game sources. Pinned to the same
  # clang-format version the pre-commit hook uses, so local formatting and CI
  # never disagree (the vendored lib/ tree is excluded -- it has its own style).
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.x"

      - name: Install clang-format
        run: pip install "clang-format==17.0.6"

      - name: Check formatting
        run: |
          find engine/src engine/include engine/tests sampleGame/src samplePlatformer/src \
            \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' -o -name '*.inl' \) \
            ! -path '*/engine/lib/*' -print0 \
          | xargs -0 clang-format --dry-run --Werror

  build:
    runs-on: ubuntu-latest
    needs: [test-core, sanitize-core, test-runtime, sanitize-runtime]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021 # v14
        with:
          version: latest

      # ccache also fronts emcc, so the wasm build reuses object files (vendored
      # libs + engine + both sample games) across runs.
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2.20
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Configure web build
        run: >
          emcmake cmake -S . -B build-web -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build web
        run: cmake --build build-web --config Release -j "$(nproc)"

      # Docs share the game's single Pages site: the game at the root, the MkDocs
      # site under /docs. --strict fails the deploy on a broken link or nav entry.
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.x"

      - name: Build docs (into /docs)
        run: |
          pip install "mkdocs-material==9.*"
          mkdocs build --strict --site-dir build-web/bin/docs

      - name: Add nojekyll
        run: touch build-web/bin/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: build-web/bin

  deploy:
    if: github.ref == 'refs/heads/master'

    # Serialize Pages deployments. Queue rather than cancel, since interrupting a
    # deploy mid-flight can leave the site half-published.
    concurrency:
      group: pages
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
