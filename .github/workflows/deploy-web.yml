name: Build and deploy web

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    # engine-core has no third-party dependencies (vendored Lua + glm), so the
    # tests build with just CMake + a compiler -- no Conan, SDL, or apt packages.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (engine-core only)
        run: cmake -S . -B build-core -DENGINE_CORE_ONLY=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build tests
        run: cmake --build build-core -j 2

      - name: Run tests
        run: ctest --test-dir build-core --output-on-failure --parallel 2

  # Runtime tests link the full engine (SDL/OpenGL), so this job restores the
  # Conan dependency closure and runs a native build. They drive systems and
  # render modules through mock seams (a fake IQuadRenderer, stub services), so
  # they run headless: no window, no GPU, no display. Split from the core test
  # job only so a standalone engine-core release can gate on core tests alone;
  # the web deploy ships the runtime (both sample games), so it needs both.
  test-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: pip install "conan==2.*"

      - name: Detect Conan profile
        run: conan profile detect --force

      # Conan installs the deps' own system requirements (X11/GL dev packages the
      # SDL build needs) via apt, so the runner needs nothing pre-installed.
      - name: Install dependencies
        run: |
          conan install . --build=missing -s build_type=Debug \
            -c tools.system.package_manager:mode=install \
            -c tools.system.package_manager:sudo=True

      - name: Configure (no sample game)
        run: cmake --preset debug -DENGINE_BUILD_SAMPLE=OFF

      - name: Build
        run: cmake --build build/Debug -j 2

      - name: Run runtime tests
        run: ctest --test-dir build/Debug -L runtime --output-on-failure --parallel 2

  build:
    runs-on: ubuntu-latest
    needs: [test, test-runtime]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure web build
        run: emcmake cmake -S . -B build-web -DCMAKE_BUILD_TYPE=Release

      - name: Build web
        run: cmake --build build-web --config Release -j 2

      # Docs share the game's single Pages site: the game at the root, the MkDocs
      # site under /docs. --strict fails the deploy on a broken link or nav entry.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build docs (into /docs)
        run: |
          pip install "mkdocs-material==9.*"
          mkdocs build --strict --site-dir build-web/bin/docs

      - name: Add nojekyll
        run: touch build-web/bin/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build-web/bin

  deploy:
    if: github.ref == 'refs/heads/master'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
