<!doctypehtml><html><head><meta charset=utf-8><link href=favicon.png rel=icon type=image/png><link href=favicon.png rel="shortcut icon"><title>Fully sick game</title><style>body,html{margin:0;padding:0;height:100%;background:radial-gradient(circle at center,#111 0,#000 100%);color:#fff;font-family:"Segoe UI",system-ui,sans-serif;overflow:hidden}#root{display:flex;flex-direction:column;height:100%;align-items:center;justify-content:center;gap:16px;padding:20px;box-sizing:border-box}#title{font-size:28px;font-weight:700;letter-spacing:1px;text-shadow:0 0 10px rgba(255,255,255,.15)}#container{aspect-ratio:4/3;width:min(70vw,900px);box-shadow:0 0 40px rgba(0,0,0,.8);border-radius:8px;overflow:hidden}canvas{width:100%;height:100%;display:block;background:#000}#panel{width:min(70vw,900px);background:rgba(20,20,20,.75);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 18px;text-align:center;box-shadow:0 0 20px rgba(0,0,0,.6)}#panel h2{margin:0 0 8px 0;font-size:14px;letter-spacing:1px;text-transform:uppercase;color:#aaa}#panel p{margin:0;font-size:14px;color:#ccc}.controls{margin-top:12px}.touch-row{display:flex;justify-content:center;gap:8px;margin-top:8px}.touch-button{width:56px;height:56px;border-radius:12px;border:1px solid #555;background:linear-gradient(180deg,#333,#181818);color:#fff;font-weight:700;font-size:20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 4px 8px rgba(0,0,0,.6);display:inline-flex;align-items:center;justify-content:center;user-select:none}.touch-button.interactive{touch-action:none}.touch-button.interactive.pressed,.touch-button.interactive:active{transform:translateY(2px);background:linear-gradient(180deg,#444,#222)}@media (pointer:coarse),(max-width:700px){#container,#panel{width:min(94vw,900px)}#title{font-size:22px}}</style></head><body><div id=root><div id=title>Segfault Simulator</div><div id=container><canvas id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas></div><div id=panel><h2>Controls</h2><p>Use WASD to move</p><div class=controls><div><div class="interactive touch-button"data-key=w>W</div></div><div class=touch-row><div class="interactive touch-button"data-key=a>A</div><div class="interactive touch-button"data-key=s>S</div><div class="interactive touch-button"data-key=d>D</div></div></div></div></div><script>const canvas=document.getElementById("canvas");var Module={canvas:canvas};function emitKey(e,t){window.dispatchEvent(new KeyboardEvent(e,{key:t,code:"Key"+t.toUpperCase(),bubbles:!0}))}document.querySelectorAll(".touch-button.interactive").forEach((e=>{const t=e.dataset.key,s=s=>{s.preventDefault(),e.classList.add("pressed"),canvas.focus(),emitKey("keydown",t)},n=s=>{s.preventDefault(),e.classList.remove("pressed"),emitKey("keyup",t)};e.addEventListener("touchstart",s,{passive:!1}),e.addEventListener("touchend",n,{passive:!1}),e.addEventListener("touchcancel",n,{passive:!1}),e.addEventListener("mousedown",s),e.addEventListener("mouseup",n),e.addEventListener("mouseleave",n)}))</script><script async src=index.js></script></body></html>
