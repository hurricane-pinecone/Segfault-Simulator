<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SFS — Sample Platformer</title>
    <!-- Sets COOP/COEP via a service worker so SharedArrayBuffer (pthreads)
         works on GitHub Pages, which doesn't send those headers itself. -->
    <script src="coi-serviceworker.js"></script>
    <link rel="icon" type="image/png" href="favicon.png" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a12;
        color: #cdd2e0;
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }
      #wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
      }
      /* Largest 4:3 box that fits the viewport. */
      canvas {
        background: #000;
        outline: none;
        max-width: 100vw;
        max-height: 92vh;
        aspect-ratio: 4 / 3;
        height: 92vh;
      }
      #hint {
        padding: 6px;
        font-size: 13px;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
      <div id="hint">Click the game to focus &middot; A/D move &middot; Space jump &middot; hold Left-click to shoot</div>
    </div>

    <script>
      const canvas = document.getElementById("canvas");

      // The engine binds SDL keyboard to "#canvas", so the canvas must hold
      // focus for input. Grab it on load and whenever clicked.
      var Module = {
        canvas,
        onRuntimeInitialized() {
          canvas.focus();
        },
      };
      window.addEventListener("load", () => canvas.focus());
      canvas.addEventListener("mousedown", () => canvas.focus());
    </script>

    {{{ SCRIPT }}}
  </body>
</html>
