site_name: SegFaultSimulator
site_description: A 2D game engine with an ECS core and two render paths.
site_url: https://hurricane-pinecone.github.io/Segfault-Simulator/docs/
repo_url: https://github.com/hurricane-pinecone/Segfault-Simulator
repo_name: hurricane-pinecone/Segfault-Simulator
edit_uri: edit/master/docs/
docs_dir: docs

theme:
  name: material
  font:
    text: Inter           # clean, Stripe-like sans (replaces default Roboto)
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  # Brand colours are 'custom' -- defined in docs/stylesheets/extra.css.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes     # a folder's index.md is its section landing page
    - navigation.expand      # show the full section tree in the left sidebar
    - navigation.top         # back-to-top button
    - navigation.tracking
    - toc.follow             # right-hand per-page section list follows scroll
    - search.suggest
    - search.highlight
    - content.code.copy      # copy button on code blocks

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Engine core:
      - core/index.md
      - Entities, components & systems: core/ecs/index.md
      - Voxel terrain: core/voxel/index.md
      - Particles:
          - core/particles/index.md
          - Decals & splatter: core/particles/decals/index.md
      - Scripting:
          - core/scripting/index.md
          - Modding API: core/scripting/modding-api/index.md
          - Live config: core/scripting/live-config/index.md
          - Running & safety: core/scripting/running/index.md
  - Runtime:
      - runtime/index.md
      - Game & scenes: runtime/game-and-scenes/index.md
      - Runtime systems:
          - runtime/systems/index.md
          - Camera system: runtime/systems/camera-system/index.md
      - Voxel world: runtime/voxel/index.md
      - Rendering:
          - runtime/rendering/index.md
          - Render modules: runtime/rendering/render-modules/index.md
      - Particles in your game: runtime/particles/index.md
